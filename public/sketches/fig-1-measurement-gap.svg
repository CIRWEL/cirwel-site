<!--
  FIG. 1 — The measurement gap.
  Three labeled regions on the time axis: pre-deployment evaluation
  (solid, well-instrumented), the runtime middle (empty, hatched-out
  question), post-incident forensics (solid, well-instrumented).
  The hatched-out middle is the entire argument of §01.

  Engraving register: oxblood ink on cream, hairline plate frame,
  hand-cut roughness, caption in mono small caps.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440">
  <defs>
    <filter id="rough1" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0.5"/>
    </filter>

    <pattern id="gapHatch" patternUnits="userSpaceOnUse" width="6" height="6"
             patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#7A1F1F" stroke-width="0.7" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- Cream paper -->
  <rect width="720" height="440" fill="#F5F1E8"/>

  <!-- Plate frame: outer + inner hairlines -->
  <rect x="20" y="20" width="680" height="400" fill="none" stroke="#7A1F1F" stroke-width="1.2"/>
  <rect x="26" y="26" width="668" height="388" fill="none" stroke="#7A1F1F" stroke-width="0.4"/>

  <!-- Corner fleurons -->
  <g stroke="#7A1F1F" stroke-width="0.7" fill="#7A1F1F">
    <line x1="20" y1="20" x2="34" y2="34" stroke-width="0.7" fill="none"/>
    <circle cx="22" cy="22" r="1.6"/>
    <line x1="700" y1="20" x2="686" y2="34" stroke-width="0.7" fill="none"/>
    <circle cx="698" cy="22" r="1.6"/>
    <line x1="20" y1="420" x2="34" y2="406" stroke-width="0.7" fill="none"/>
    <circle cx="22" cy="418" r="1.6"/>
    <line x1="700" y1="420" x2="686" y2="406" stroke-width="0.7" fill="none"/>
    <circle cx="698" cy="418" r="1.6"/>
  </g>

  <!-- Body group under engraving filter -->
  <g filter="url(#rough1)">

    <!-- Three regions on a time axis. Y positions for the ribbon: y=160 to 240 -->
    <!-- LEFT: pre-deployment evaluation (solid, well-instrumented) -->
    <g>
      <rect x="80" y="160" width="170" height="80" fill="#7A1F1F" opacity="0.18"
            stroke="#7A1F1F" stroke-width="1.4"/>
      <!-- Tick marks suggesting measurements -->
      <g stroke="#7A1F1F" stroke-width="0.8">
        <line x1="100" y1="170" x2="100" y2="190"/>
        <line x1="120" y1="170" x2="120" y2="190"/>
        <line x1="140" y1="170" x2="140" y2="190"/>
        <line x1="160" y1="170" x2="160" y2="190"/>
        <line x1="180" y1="170" x2="180" y2="190"/>
        <line x1="200" y1="170" x2="200" y2="190"/>
        <line x1="220" y1="170" x2="220" y2="190"/>
      </g>
      <text x="165" y="222" text-anchor="middle"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            font-size="11" letter-spacing="2.5" fill="#1A1612" font-weight="500">
        BENCHMARK
      </text>
    </g>

    <!-- MIDDLE: the runtime gap (empty, hatched, with question mark) -->
    <g>
      <rect x="265" y="160" width="190" height="80" fill="url(#gapHatch)"
            stroke="#7A1F1F" stroke-width="1.2"
            stroke-dasharray="4 3"/>
      <text x="360" y="210" text-anchor="middle"
            font-family="'Fraunces Variable', Georgia, serif"
            font-size="48" font-style="italic" fill="#7A1F1F" font-weight="500"
            font-variation-settings="'opsz' 144, 'WONK' 1">?</text>
    </g>

    <!-- RIGHT: post-incident forensics (solid, well-instrumented) -->
    <g>
      <rect x="470" y="160" width="170" height="80" fill="#7A1F1F" opacity="0.18"
            stroke="#7A1F1F" stroke-width="1.4"/>
      <g stroke="#7A1F1F" stroke-width="0.8">
        <line x1="490" y1="210" x2="490" y2="230"/>
        <line x1="510" y1="210" x2="510" y2="230"/>
        <line x1="530" y1="210" x2="530" y2="230"/>
        <line x1="550" y1="210" x2="550" y2="230"/>
        <line x1="570" y1="210" x2="570" y2="230"/>
        <line x1="590" y1="210" x2="590" y2="230"/>
        <line x1="610" y1="210" x2="610" y2="230"/>
      </g>
      <text x="555" y="222" text-anchor="middle"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            font-size="11" letter-spacing="2.5" fill="#1A1612" font-weight="500">
        POST-MORTEM
      </text>
    </g>

    <!-- Time axis with arrow -->
    <line x1="80" y1="280" x2="640" y2="280" stroke="#7A1F1F" stroke-width="1"/>
    <line x1="640" y1="280" x2="632" y2="276" stroke="#7A1F1F" stroke-width="1"/>
    <line x1="640" y1="280" x2="632" y2="284" stroke="#7A1F1F" stroke-width="1"/>
    <text x="650" y="284"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="10" letter-spacing="1.5" fill="#5C544A">t →</text>

    <!-- Region labels above each box -->
    <g font-family="'JetBrains Mono', ui-monospace, monospace"
       font-size="10" letter-spacing="2" fill="#5C544A" text-anchor="middle">
      <text x="165" y="148">PRE-DEPLOYMENT</text>
      <text x="360" y="148">RUNTIME</text>
      <text x="555" y="148">POST-INCIDENT</text>
    </g>

    <!-- Bracket the gap with hairline span markers -->
    <g stroke="#7A1F1F" stroke-width="0.6" fill="none">
      <path d="M 265 250 L 265 258 L 455 258 L 455 250"/>
    </g>
    <text x="360" y="276"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="13" font-style="italic" fill="#7A1F1F" text-anchor="middle">
      the measurement gap
    </text>
  </g>

  <!-- Caption (outside engraving filter — captions stay sharp) -->
  <line x1="80" y1="370" x2="640" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <text x="360" y="392"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="11" letter-spacing="3" fill="#7A1F1F" text-anchor="middle">
    FIG. I &middot; THE MEASUREMENT GAP
  </text>
  <text x="360" y="408"
        font-family="'Fraunces Variable', Georgia, serif"
        font-size="11" font-style="italic" fill="#5C544A" text-anchor="middle">
    What lies between the model that was tested and the failure that is forensically reconstructed.
  </text>
</svg>
