<!--
  Alternative favicon — Path B.
  Adapts the existing CIRWEL hex logo into the publication aesthetic:
  flat-line engraving instead of 3D render, oxblood on cream, hairline
  weights. Same brand DNA (nested hexagons), publication grammar.

  Viewable at https://cirwelsystems.com/favicon-hex.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cream paper, slightly rounded -->
  <rect x="0" y="0" width="32" height="32" rx="4" fill="#F5F1E8"/>

  <!-- Hairline ring (matches favicon.svg sibling) -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="3.5"
        fill="none" stroke="#C9C0AE" stroke-width="1"/>

  <!-- Outer hexagon (flat-top), oxblood hairline -->
  <polygon points="10,5.6 22,5.6 28,16 22,26.4 10,26.4 4,16"
           fill="none" stroke="#7A1F1F" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Inner nested hexagon — references the original 3D logo's cube-in-cube -->
  <polygon points="13,10.8 19,10.8 22,16 19,21.2 13,21.2 10,16"
           fill="none" stroke="#7A1F1F" stroke-width="1" stroke-linejoin="round"/>

  <!-- Tiny center dot — the printer's-device flourish -->
  <circle cx="16" cy="16" r="1.4" fill="#7A1F1F"/>
</svg>
